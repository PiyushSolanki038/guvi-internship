<!DOCTYPE html>
<html lang="en">
<!--
  login.html — Login page
  No inline JS. No inline CSS. Bootstrap form (requirement).
  Session saved to localStorage only (requirement). Logic in js/login.js.
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GUVI — Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="auth-page">

    <!-- ── Top bar with step indicator ─────────────────────────────────── -->
    <header class="auth-topbar">
      <a href="index.html" class="nav-brand">GUVI</a>
      <div class="auth-steps">
        <span class="auth-step"><span class="step-num">1</span>Register</span>
        <span class="auth-step active"><span class="step-num">2</span>Login</span>
        <span class="auth-step"><span class="step-num">3</span>Profile</span>
      </div>
    </header>

    <!-- ── Form ─────────────────────────────────────────────────────────── -->
    <main class="auth-body">
      <div class="auth-card">

        <div class="auth-form-header">
          <h1>Welcome back</h1>
          <p>Enter your credentials to continue.</p>
        </div>

        <!-- Alert (shown by login.js) -->
        <div id="alert-box" role="alert"></div>

        <!-- Login form — no action/method; jQuery AJAX handles it (requirement) -->
        <form id="login-form" novalidate>

          <div class="row g-3">

            <!-- Email -->
            <div class="col-12">
              <div class="field-group">
                <label for="login-email" class="field-label">Email address</label>
                <input type="email" id="login-email" class="field-input form-control" placeholder="you@example.com" autocomplete="email" required />
                <div class="field-error invalid-feedback">Enter a valid email.</div>
              </div>
            </div>

            <!-- Password -->
            <div class="col-12">
              <div class="field-group">
                <label for="login-password" class="field-label">Password</label>
                <input type="password" id="login-password" class="field-input form-control" placeholder="Your password" autocomplete="current-password" required />
                <div class="field-error invalid-feedback">Password is required.</div>
              </div>
            </div>

            <!-- Submit -->
            <div class="col-12">
              <button type="button" id="btn-login" class="btn-submit">
                Sign in
              </button>
            </div>

          </div>

        </form>

        <div class="or-divider">or</div>

        <p class="auth-switch">
          No account yet? <a href="register.html">Register here &rarr;</a>
        </p>

      </div>
    </main>

  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <!-- Login logic (separate JS file — requirement) -->
  <script src="js/login.js"></script>

</body>
</html>
